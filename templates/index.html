<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e67e22">
<link rel="manifest" href="/manifest.json">
<title>流霞 - 朝霞晚霞数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg-color: #f5f5f5;
    --text-color: #333;
    --card-bg: #fff;
    --border-color: #eee;
    --hover-bg: #fdf2e9;
    --text-secondary: #555;
  }
  [data-theme="dark"] {
    --bg-color: #1a1a1a;
    --text-color: #e0e0e0;
    --card-bg: #2d2d2d;
    --border-color: #404040;
    --hover-bg: #3a3a3a;
    --text-secondary: #b0b0b0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-color); color: var(--text-color); padding: 20px; transition: background 0.3s, color 0.3s; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 20px; color: #e67e22; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .header h1 { margin-bottom: 0; }
  .theme-toggle { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 8px 16px; cursor: pointer; font-size: 14px; color: var(--text-color); }
  .theme-toggle:hover { background: var(--hover-bg); }
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .controls select, .controls input { padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); color: var(--text-color); }
  .controls button { padding: 6px 14px; border: none; border-radius: 4px; background: #e67e22; color: #fff; cursor: pointer; }
  .controls button:hover { background: #d35400; }
  .controls button.secondary { background: var(--card-bg); color: #e67e22; border: 1px solid #e67e22; }
  .controls button.secondary:hover { background: var(--hover-bg); }
  .controls button.secondary.active { background: #e67e22; color: #fff; }
  .chart-box { background: var(--card-bg); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); transition: background 0.3s; }
  .chart-box h2 { font-size: 16px; margin-bottom: 10px; color: var(--text-secondary); }
  .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
  .loading { text-align: center; padding: 20px; color: var(--text-secondary); }
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
  .pagination button { padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); color: var(--text-color); cursor: pointer; }
  .pagination button:hover { background: var(--hover-bg); }
  .pagination button.active { background: #e67e22; color: #fff; border-color: #e67e22; }
  .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
  .quick-range { display: inline-flex; gap: 6px; flex-wrap: wrap; }
  .date-btn { position: relative; }
  .date-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: none; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card-bg); border-radius: 12px; padding: 24px; width: 90%; max-width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,.2); }
  .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--text-color); }
  .modal label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; margin-top: 12px; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input[type="date"] { width: 100%; padding: 8px 10px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--bg-color); color: var(--text-color); font-size: 14px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal-actions button { padding: 8px 20px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; }
  .modal-actions .btn-cancel { background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); }
  .modal-actions .btn-confirm { background: #e67e22; color: #fff; }
  .record-card { background: var(--card-bg); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); transition: background 0.3s; }
  .record-card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .record-card .card-city { font-weight: 600; font-size: 15px; }
  .record-card .card-date { font-size: 13px; color: var(--text-secondary); }
  .record-card .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; font-size: 13px; }
  .record-card .card-field { display: flex; flex-direction: column; }
  .record-card .card-field .label { color: var(--text-secondary); font-size: 12px; }
  .record-card .card-field .value { font-weight: 500; }
  .record-card .card-tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 500; }
  .record-card .tag-morning { background: #ffeaa7; color: #d35400; }
  .record-card .tag-evening { background: #dfe6e9; color: #2d3436; }
  .table-wrap { display: none; }
  .date-group { background: var(--card-bg); border-radius: 8px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; transition: background 0.3s; }
  .date-header { background: #e67e22; color: #fff; padding: 10px 16px; font-weight: 600; font-size: 15px; }
  .event-section { border-bottom: 1px solid var(--border-color); }
  .event-section:last-child { border-bottom: none; }
  .event-label { padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: var(--hover-bg); display: flex; align-items: center; gap: 8px; }
  .event-label .tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .event-label .tag-morning { background: #ffeaa7; color: #d35400; }
  .event-label .tag-evening { background: #dfe6e9; color: #2d3436; }
  .model-row { display: grid; grid-template-columns: 70px 1fr 1fr; padding: 10px 16px; border-bottom: 1px solid var(--border-color); font-size: 14px; align-items: center; }
  .model-row:last-child { border-bottom: none; }
  .model-cell { display: flex; flex-direction: column; gap: 2px; }
  .model-cell .model-name { font-weight: 600; font-size: 13px; }
  .model-cell .metric { font-size: 13px; color: var(--text-secondary); }
  .model-cell .metric b { color: var(--text-color); font-weight: 500; }
  .quality-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 12px; font-weight: 500; }
  .q-low { background: #dfe6e9; color: #636e72; }
  .q-mid { background: #ffeaa7; color: #d35400; }
  .q-high { background: #e17055; color: #fff; }
  @media (max-width: 768px) {
    .container { padding: 10px; }
    .header { flex-wrap: wrap; gap: 8px; }
    .header h1 { font-size: 20px; }
    .controls { gap: 8px; }
    .controls select { min-width: 0; flex: 1 1 auto; }
    .quick-range { width: 100%; justify-content: flex-start; }
    .quick-range button { flex: 0 0 auto; font-size: 13px; padding: 5px 10px; }
  }
  @media (min-width: 769px) {
    .record-card { display: none; }
    .table-wrap { display: block; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>流霞</h1>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>

  <div class="controls">
    <select id="city">
      <option value="">全部城市</option>
    </select>
    <select id="eventType">
      <option value="">全部</option>
      <option value="morning">朝霞</option>
      <option value="evening">晚霞</option>
    </select>
    <div class="quick-range">
      <button class="secondary" onclick="quickRange(30, this)">近1月</button>
      <button class="secondary" onclick="quickRange(90, this)">近3月</button>
      <button class="secondary" onclick="quickRange(180, this)">近半年</button>
      <button class="secondary" onclick="quickRange(365, this)">近1年</button>
      <button class="secondary" onclick="quickRange(0, this)">全部</button>
    </div>
    <button class="secondary date-btn" onclick="openDateModal()" id="dateBtn">📅 自定义日期</button>
    <button onclick="loadData()">查询</button>
    <button onclick="exportData('csv')">导出 CSV</button>
    <button onclick="exportData('json')">导出 JSON</button>
  </div>

  <div class="chart-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>鲜艳度趋势</h2>
      <button class="secondary" onclick="downloadChart('qualityChart', '鲜艳度趋势')">下载图片</button>
    </div>
    <canvas id="qualityChart"></canvas>
  </div>

  <div class="chart-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>气溶胶趋势</h2>
      <button class="secondary" onclick="downloadChart('aodChart', '气溶胶趋势')">下载图片</button>
    </div>
    <canvas id="aodChart"></canvas>
  </div>

  <div class="chart-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>模型对比统计</h2>
      <button class="secondary" onclick="downloadChart('modelCompareChart', '模型对比统计')">下载图片</button>
    </div>
    <canvas id="modelCompareChart"></canvas>
  </div>

  <div class="chart-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>月度趋势</h2>
      <button class="secondary" onclick="downloadChart('monthlyChart', '月度趋势')">下载图片</button>
    </div>
    <canvas id="monthlyChart"></canvas>
  </div>

  <div class="chart-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h2>城市对比</h2>
      <button class="secondary" onclick="downloadChart('cityCompareChart', '城市对比')">下载图片</button>
    </div>
    <canvas id="cityCompareChart"></canvas>
  </div>

  <div id="loadingIndicator" class="loading" style="display:none;">加载中...</div>

  <input type="hidden" id="startDate">
  <input type="hidden" id="endDate">

  <div id="cardList"></div>

  <div class="table-wrap" id="tableWrap"></div>
  <div id="pagination" class="pagination"></div>
  <div id="emptyMsg" class="empty" style="display:none;">暂无数据</div>
</div>

<div class="modal-overlay" id="dateModal" onclick="closeDateModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>自定义日期范围</h3>
    <label>开始日期</label>
    <input type="date" id="modalStart">
    <label>结束日期</label>
    <input type="date" id="modalEnd">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDateModal()">取消</button>
      <button class="btn-confirm" onclick="confirmDate()">确定</button>
    </div>
  </div>
</div>

<script>
let qualityChart, aodChart, modelCompareChart, monthlyChart, cityCompareChart;
let allRecords = [];
let currentPage = 1;
const pageSize = 20;

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function initTheme() {
  const saved = localStorage.getItem('theme');
  const theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
  updateThemeButton(theme);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeButton(next);
  updateChartColors();
}

function updateThemeButton(theme) {
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
}

function updateChartColors() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const textColor = isDark ? '#e0e0e0' : '#333';
  const gridColor = isDark ? '#404040' : '#eee';

  [qualityChart, aodChart, modelCompareChart, monthlyChart, cityCompareChart].forEach(chart => {
    if (chart) {
      chart.options.scales.x && (chart.options.scales.x.ticks = { color: textColor });
      chart.options.scales.x && (chart.options.scales.x.grid = { color: gridColor });
      Object.values(chart.options.scales).forEach(scale => {
        if (scale.ticks) scale.ticks.color = textColor;
        if (scale.grid) scale.grid.color = gridColor;
        if (scale.title) scale.title.color = textColor;
      });
      chart.options.plugins.legend.labels.color = textColor;
      chart.update();
    }
  });
}

function openDateModal() {
  const modal = document.getElementById('dateModal');
  document.getElementById('modalStart').value = document.getElementById('startDate').value;
  document.getElementById('modalEnd').value = document.getElementById('endDate').value;
  modal.classList.add('open');
}

function closeDateModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('dateModal').classList.remove('open');
}

function confirmDate() {
  const s = document.getElementById('modalStart').value;
  const e = document.getElementById('modalEnd').value;
  document.getElementById('startDate').value = s;
  document.getElementById('endDate').value = e;
  document.querySelectorAll('.controls .secondary').forEach(b => b.classList.remove('active'));
  updateDateBtnLabel();
  document.getElementById('dateModal').classList.remove('open');
  loadData();
}

function updateDateBtnLabel() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  const btn = document.getElementById('dateBtn');
  if (s || e) {
    btn.textContent = '📅 ' + (s || '...') + ' ~ ' + (e || '...');
    btn.classList.add('active');
  } else {
    btn.textContent = '📅 自定义日期';
    btn.classList.remove('active');
  }
}

function getFilters() {
  return {
    city: document.getElementById('city').value,
    event_type: document.getElementById('eventType').value,
    start: document.getElementById('startDate').value,
    end: document.getElementById('endDate').value,
  };
}

async function loadCities() {
  const res = await fetch('/api/cities');
  const cities = await res.json();
  const select = document.getElementById('city');
  cities.forEach(city => {
    const option = document.createElement('option');
    option.value = city;
    option.textContent = city;
    select.appendChild(option);
  });
}

function qs(params) {
  const s = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) { if (v) s.set(k, v); }
  return s.toString();
}

async function loadData() {
  const loading = document.getElementById('loadingIndicator');
  loading.style.display = 'block';

  try {
    const params = getFilters();
    const res = await fetch('/api/data?' + qs(params));
    allRecords = await res.json();
    currentPage = 1;
    renderTable();
    renderCards();
    renderCharts(allRecords);
    loadStatistics();
  } finally {
    loading.style.display = 'none';
  }
}

function renderCards() {
  const container = document.getElementById('cardList');
  if (!allRecords || allRecords.length === 0) {
    container.innerHTML = '';
    return;
  }
  const totalPages = Math.ceil(allRecords.length / pageSize);
  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageRecords = allRecords.slice(start, end);

  container.innerHTML = pageRecords.map(r => {
    const tagClass = r.event_type === 'morning' ? 'tag-morning' : 'tag-evening';
    const typeName = typeMap[r.event_type] || r.event_type;
    const qVal = r.quality != null ? r.quality.toFixed(4) : '-';
    const aVal = r.aod != null ? r.aod.toFixed(4) : '-';
    return `<div class="record-card">
      <div class="card-header">
        <span class="card-city">${escapeHtml(r.city || '-')}</span>
        <span class="card-date">${escapeHtml(r.date)} ${escapeHtml(r.time)}</span>
      </div>
      <div class="card-grid">
        <div class="card-field"><span class="label">类型</span><span class="value"><span class="card-tag ${tagClass}">${typeName}</span> ${escapeHtml(r.model)}</span></div>
        <div class="card-field"><span class="label">鲜艳度</span><span class="value">${qVal}</span></div>
        <div class="card-field"><span class="label">鲜艳度说明</span><span class="value">${escapeHtml(qualityLabel(r.quality))}</span></div>
        <div class="card-field"><span class="label">气溶胶</span><span class="value">${aVal}</span></div>
        <div class="card-field"><span class="label">气溶胶说明</span><span class="value">${escapeHtml(aodLabel(r.aod))}</span></div>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const wrap = document.getElementById('tableWrap');
  const empty = document.getElementById('emptyMsg');
  const pagination = document.getElementById('pagination');

  if (!allRecords || allRecords.length === 0) {
    wrap.innerHTML = '';
    empty.style.display = 'block';
    pagination.innerHTML = '';
    return;
  }

  empty.style.display = 'none';

  const totalPages = Math.ceil(allRecords.length / pageSize);
  const start = (currentPage - 1) * pageSize;
  const end = start + pageSize;
  const pageRecords = allRecords.slice(start, end);

  const sorted = [...pageRecords].sort((a, b) => {
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    const aOrder = a.event_type === 'morning' ? 0 : 1;
    const bOrder = b.event_type === 'morning' ? 0 : 1;
    if (aOrder !== bOrder) return aOrder - bOrder;
    if (a.time !== b.time) return a.time < b.time ? -1 : 1;
    return a.model < b.model ? -1 : 1;
  });

  const groups = {};
  sorted.forEach(r => {
    const key = r.date;
    if (!groups[key]) groups[key] = {};
    const eKey = r.event_type;
    if (!groups[key][eKey]) groups[key][eKey] = {};
    groups[key][eKey][r.model] = r;
  });

  let html = '';
  const dates = Object.keys(groups).sort();
  dates.forEach(date => {
    const evts = groups[date];
    html += `<div class="date-group"><div class="date-header">${escapeHtml(date)}</div>`;
    const eventOrder = ['morning', 'evening'];
    eventOrder.forEach(eType => {
      if (!evts[eType]) return;
      const models = evts[eType];
      const typeName = typeMap[eType];
      const tagClass = eType === 'morning' ? 'tag-morning' : 'tag-evening';
      const time = Object.values(models)[0]?.time || '';
      html += `<div class="event-section">`;
      html += `<div class="event-label"><span class="tag ${tagClass}">${typeName}</span> ${escapeHtml(time)}</div>`;
      html += `<div class="model-row"><div style="font-size:12px;color:var(--text-secondary)">模型</div>`;
      ['GFS', 'EC'].forEach(m => {
        const r = models[m];
        if (!r) { html += `<div class="model-cell"><span class="model-name">${m}</span><span class="metric">-</span></div>`; return; }
        const qBadge = r.quality != null
          ? `<span class="quality-badge ${r.quality < 0.2 ? 'q-low' : r.quality < 0.8 ? 'q-mid' : 'q-high'}">${r.quality.toFixed(4)}</span>`
          : '-';
        const qLabel = qualityLabel(r.quality);
        const aodVal = r.aod != null ? r.aod.toFixed(4) : '-';
        const aodLbl = aodLabel(r.aod);
        html += `<div class="model-cell"><span class="model-name">${m}</span><span class="metric">鲜艳度 ${qBadge} ${qLabel}</span><span class="metric">气溶胶 <b>${aodVal}</b> ${aodLbl}</span></div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });

  wrap.innerHTML = html;

  if (totalPages > 1) {
    let paginationHTML = '';
    paginationHTML += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
    const maxVisible = 5;
    let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let endPage = Math.min(totalPages, startPage + maxVisible - 1);
    if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1);
    if (startPage > 1) {
      paginationHTML += `<button onclick="goToPage(1)">1</button>`;
      if (startPage > 2) paginationHTML += `<button disabled>...</button>`;
    }
    for (let i = startPage; i <= endPage; i++) {
      paginationHTML += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
    }
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) paginationHTML += `<button disabled>...</button>`;
      paginationHTML += `<button onclick="goToPage(${totalPages})">${totalPages}</button>`;
    }
    paginationHTML += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
    paginationHTML += `<span style="margin-left:10px;color:var(--text-secondary)">共 ${allRecords.length} 条</span>`;
    pagination.innerHTML = paginationHTML;
  } else {
    pagination.innerHTML = '';
  }
}

function goToPage(page) {
  currentPage = page;
  renderTable();
  renderCards();
}

async function loadStatistics() {
  const params = getFilters();
  const res = await fetch('/api/statistics?' + qs(params));
  const stats = await res.json();
  renderModelCompare(stats.models);
  renderMonthly(stats.monthly);
  loadCityComparison();
}

async function loadCityComparison() {
  const params = getFilters();
  const res = await fetch('/api/city-comparison?' + qs(params));
  const comparison = await res.json();
  renderCityComparison(comparison);
}

function renderCityComparison(comparison) {
  if (!comparison || comparison.length === 0) return;

  if (cityCompareChart) cityCompareChart.destroy();

  const cityColors = ['#e67e22', '#3498db', '#2ecc71', '#e74c3c', '#9b59b6', '#1abc9c', '#f39c12', '#34495e'];

  cityCompareChart = new Chart(document.getElementById('cityCompareChart'), {
    type: 'bar',
    data: {
      labels: comparison.map(c => c.city),
      datasets: [
        {
          label: '平均鲜艳度',
          data: comparison.map(c => c.avg_quality ? parseFloat(c.avg_quality.toFixed(4)) : 0),
          backgroundColor: comparison.map((_, i) => cityColors[i % cityColors.length]),
        },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { y: { beginAtZero: true } },
    },
  });
}

function qualityLabel(v) {
  if (v == null) return '-';
  if (v < 0.05) return '微微烧';
  if (v < 0.2) return '小烧';
  if (v < 0.4) return '小烧到中等烧';
  if (v < 0.6) return '中等烧';
  if (v < 0.8) return '中等到大烧';
  if (v < 1.0) return '不完美大烧';
  if (v < 1.5) return '典型大烧';
  if (v < 2.0) return '优质大烧';
  if (v < 2.5) return '世纪大烧';
  return '超级大烧';
}

function aodLabel(v) {
  if (v == null) return '-';
  if (v < 0.1) return '高级水晶天';
  if (v < 0.2) return '普通水晶天';
  if (v < 0.3) return '蓝天';
  if (v < 0.4) return '普通';
  if (v < 0.6) return '小污';
  if (v < 0.8) return '中污';
  return '重污';
}

const typeMap = { morning: '朝霞', evening: '晚霞' };
const modelColors = { GFS: '#3498db', EC: '#e74c3c' };
const typeMarkers = { morning: '', evening: '90' };

function renderCharts(records) {
  const grouped = {};
  records.forEach(r => {
    const key = r.model + '_' + r.event_type;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  const labels = [...new Set(records.map(r => r.date))].sort();

  const makeDatasets = (field) => Object.entries(grouped).map(([key, items]) => {
    const [model, eventType] = key.split('_');
    const label = `${model}-${typeMap[eventType] || eventType}`;
    const baseColor = modelColors[model] || '#999';
    const color = typeMarkers[eventType] ? baseColor + typeMarkers[eventType] : baseColor;
    const data = labels.map(d => { const rec = items.find(i => i.date === d); return rec ? rec[field] : null; });
    const hasGap = data.some(v => v === null);
    return {
      label,
      data,
      borderColor: color,
      borderDash: hasGap ? [5, 5] : undefined,
      tension: 0.3,
      fill: false,
    };
  });

  if (qualityChart) qualityChart.destroy();
  if (aodChart) aodChart.destroy();

  qualityChart = new Chart(document.getElementById('qualityChart'), {
    type: 'line', data: { labels, datasets: makeDatasets('quality') },
    options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
  });

  aodChart = new Chart(document.getElementById('aodChart'), {
    type: 'line', data: { labels, datasets: makeDatasets('aod') },
    options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true } } }
  });
}

function renderModelCompare(models) {
  if (!models || models.length === 0) return;

  const grouped = {};
  models.forEach(m => {
    const key = m.event_type;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(m);
  });

  const eventTypes = Object.keys(grouped);
  const modelNames = [...new Set(models.map(m => m.model))];

  const qualityData = modelNames.map(model => ({
    label: model + ' 鲜艳度',
    data: eventTypes.map(et => {
      const found = grouped[et]?.find(m => m.model === model);
      return found ? parseFloat(found.avg_quality?.toFixed(4)) : 0;
    }),
    backgroundColor: modelColors[model] || '#999',
  }));

  const aodData = modelNames.map(model => ({
    label: model + ' 气溶胶',
    data: eventTypes.map(et => {
      const found = grouped[et]?.find(m => m.model === model);
      return found ? parseFloat(found.avg_aod?.toFixed(4)) : 0;
    }),
    backgroundColor: modelColors[model] ? modelColors[model] + '80' : '#999800',
  }));

  if (modelCompareChart) modelCompareChart.destroy();

  modelCompareChart = new Chart(document.getElementById('modelCompareChart'), {
    type: 'bar',
    data: {
      labels: eventTypes.map(et => et === 'morning' ? '朝霞' : '晚霞'),
      datasets: [...qualityData, ...aodData],
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { y: { beginAtZero: true } },
    },
  });
}

function renderMonthly(monthly) {
  if (!monthly || monthly.length === 0) return;

  if (monthlyChart) monthlyChart.destroy();

  monthlyChart = new Chart(document.getElementById('monthlyChart'), {
    type: 'line',
    data: {
      labels: monthly.map(m => m.month),
      datasets: [
        {
          label: '平均鲜艳度',
          data: monthly.map(m => m.avg_quality ? parseFloat(m.avg_quality.toFixed(4)) : 0),
          borderColor: '#e67e22',
          tension: 0.3,
          fill: false,
          yAxisID: 'y',
        },
        {
          label: '平均气溶胶',
          data: monthly.map(m => m.avg_aod ? parseFloat(m.avg_aod.toFixed(4)) : 0),
          borderColor: '#3498db',
          tension: 0.3,
          fill: false,
          yAxisID: 'y1',
        },
      ],
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: {
        y: {
          type: 'linear',
          position: 'left',
          title: { display: true, text: '鲜艳度' },
        },
        y1: {
          type: 'linear',
          position: 'right',
          title: { display: true, text: '气溶胶' },
          grid: { drawOnChartArea: false },
        },
      },
    },
  });
}

function exportData(format) {
  const params = getFilters();
  params.format = format;
  window.location.href = '/api/export?' + qs(params);
}

function downloadChart(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function quickRange(days, btn) {
  document.querySelectorAll('.quick-range .secondary').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const end = new Date();
  const start = new Date();
  if (days > 0) {
    start.setDate(start.getDate() - days);
    document.getElementById('startDate').value = start.toISOString().slice(0, 10);
    document.getElementById('endDate').value = end.toISOString().slice(0, 10);
  } else {
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value = '';
  }
  updateDateBtnLabel();
  loadData();
}

initTheme();
loadCities();
loadData();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(() => {});
}
</script>
